##### Application properties #####
app.name=@project.name@
app.desc=@project.description@
app.version=@project.version@
app.url=http://localhost:8080
app.dev-name=John Doe
app.dev-email=dumy@dumy
app.upload.dir=uploads/avatars

#####  SPRING AVATAR PROPERTIES #####
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

## Docker Compose ##
spring.docker.compose.file=../docker-compose.yml

## Spring Data Source ##
spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon_tcg
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

## Spring JPA ##
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

## Flyway ##
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Evita que Flyway falle si las tablas ya existen (BD con datos previos)
spring.flyway.baseline-on-migrate=true

logging.level.root=WARN
logging.level.ar.edu.utn.frc.tup.piii.engine.GameEngine=DEBUG
logging.level.ar.edu.utn.frc.tup.piii.services.cards.CardCatalogService=DEBUG

## Multipart file upload ##
spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB

